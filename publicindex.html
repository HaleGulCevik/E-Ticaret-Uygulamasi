<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulut E-Ticaret</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .product-list { display: flex; gap: 20px; flex-wrap: wrap; }
        .product-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 200px; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1>Bulut E-Ticaret Mağazası</h1>
    <div id="products" class="product-list"></div>

    <script>
        
        async function fetchProducts() {
            const response = await fetch('/api/products');
            const products = await response.json();
            const productsDiv = document.getElementById('products');
            
            if(products.length === 0) {
                productsDiv.innerHTML = "<p>Henüz ürün eklenmemiş.</p>";
                return;
            }

            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <h3>${product.name}</h3>
                    <p>Fiyat: ${product.price} TL</p>
                    <p>Stok: ${product.stock}</p>
                    <button onclick="buyProduct('${product._id}')">Satın Al</button>
                `;
                productsDiv.appendChild(card);
            });
        }

        
        async function buyProduct(productId) {
            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId, quantity: 1 })
            });
            const result = await response.json();
            alert(result.message);
            location.reload(); // Stoğu güncellemek için sayfayı yenile
        }

        fetchProducts();
    </script>
</body>
</html>
